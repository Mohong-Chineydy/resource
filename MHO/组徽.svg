<svg width="400" height="400" viewBox="-35 -35 70 70" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="1" fill="none">

    <!-- 1. 最外层菱形 -->
    <polygon points="0,-30 30,0 0,30 -30,0" />

    <!-- 2. 菱形的主对角线（水平 + 垂直） -->
    <line x1="-30" y1="0" x2="30" y2="0" />
    <line x1="0" y1="-30" x2="0" y2="30" />

    <!-- 3. 外正方形（菱形内最大轴对齐正方形 = 菱形边中点构成） -->
    <rect x="-15" y="-15" width="30" height="30" />

    <!-- 4. 外正方形内部的 X 十字（两条对角线） -->
    <line x1="-15" y1="-15" x2="15" y2="15" />
    <line x1="-15" y1="15" x2="15" y2="-15" />

    <!-- 5. 内正方形（更小的轴对齐正方形） -->
    <rect x="-10" y="-10" width="20" height="20" />

    <!-- 6. 内正方形四个顶点 → 各自连接最近的两个菱形顶点（共8条线） -->
    <line x1="10" y1="10" x2="0" y2="30" />
    <line x1="10" y1="10" x2="30" y2="0" />
    <line x1="-10" y1="10" x2="0" y2="30" />
    <line x1="-10" y1="10" x2="-30" y2="0" />
    <line x1="-10" y1="-10" x2="0" y2="-30" />
    <line x1="-10" y1="-10" x2="-30" y2="0" />
    <line x1="10" y1="-10" x2="0" y2="-30" />
    <line x1="10" y1="-10" x2="30" y2="0" />

    <!-- 7. 内正方形四条边中点 → 外正方形对应边的两个端点（共8条线） -->
    <!-- 上边中点 (0,10) → (-15,15) & (15,15) -->
    <line x1="0" y1="10" x2="-15" y2="15" />
    <line x1="0" y1="10" x2="15" y2="15" />
    <!-- 右边中点 (10,0) → (15,15) & (15,-15) -->
    <line x1="10" y1="0" x2="15" y2="15" />
    <line x1="10" y1="0" x2="15" y2="-15" />
    <!-- 下边中点 (0,-10) → (15,-15) & (-15,-15) -->
    <line x1="0" y1="-10" x2="15" y2="-15" />
    <line x1="0" y1="-10" x2="-15" y2="-15" />
    <!-- 左边中点 (-10,0) → (-15,15) & (-15,-15) -->
    <line x1="-10" y1="0" x2="-15" y2="15" />
    <line x1="-10" y1="0" x2="-15" y2="-15" />

  </g>
</svg>
